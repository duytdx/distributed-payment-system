spring.application.name=api-gateway
server.port=8080

# JWT (same secret as user-service)
jwt.secret=my-super-secret-key-for-payment-system-2024

# Routes
spring.cloud.gateway.mvc.routes[0].id=user-service
spring.cloud.gateway.mvc.routes[0].uri=http://user-service:8084
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/auth/**,/api/users/**

spring.cloud.gateway.mvc.routes[1].id=order-service
spring.cloud.gateway.mvc.routes[1].uri=http://order-service:8081
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/orders/**

spring.cloud.gateway.mvc.routes[2].id=payment-service
spring.cloud.gateway.mvc.routes[2].uri=http://payment-service:8082
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/api/payments/**

spring.cloud.gateway.mvc.routes[3].id=notification-service
spring.cloud.gateway.mvc.routes[3].uri=http://notification-service:8083
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/api/notifications/**
